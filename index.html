<!DOCTYPE html>
<html>
<head>
  <title>Matīt Clicker</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #b3abab;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    #addPoint {
      cursor: pointer;
      height: 40vh;
      margin: 20px 0;
      transition: transform 0.1s;
      -webkit-user-drag: none;
    }

    #addPoint:active {
      transform: scale(0.95);
    }

    /* SHOP BUTTON STYLES */
    .shop-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      transition: transform 0.2s;
    }

    .shop-btn:hover {
      transform: scale(1.1);
    }

    .shop-icon {
      height: 50px;
      width: auto;
    }

    /* THE SHOP MENU (MODAL) */
    #shopMenu {
      display: none; /* Hidden by default */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 70vh;
      background-color: #c9c2c2; /* Slightly brighter than #b3abab */
      border: 4px solid #444;
      border-radius: 15px;
      z-index: 100;
      padding: 20px;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    /* THE X BUTTON */
    #closeShop {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      color: #444;
    }

    #closeShop:hover {
      color: #000;
    }

    /* +1 POPUP STYLES */
    .plus-one {
      position: absolute;
      font-size: 24px;
      font-weight: bold;
      color: #222;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      transform: translate(-50%, -50%);
    }

    .plus-one img {
      height: 28px;
      width: auto;
    }

    @keyframes floatUp {
      from { opacity: 1; }
      to {
        transform: translate(calc(-50% + var(--x)), -120px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <h1>Matīt clicker</h1>
  <p>Click the Matīt</p>

  <img id="addPoint" src="button1.jpg" alt="Add point" draggable="false">

  <p>€: <span id="score">0</span></p>

  <button id="openShop" class="shop-btn">
    <img src="shop.png" class="shop-icon" draggable="false">
  </button>

  <div id="shopMenu">
    <span id="closeShop">&times;</span>
    <h2 style="text-align: center;">Shop</h2>
    <hr>
    <p style="text-align: center;">Upgrades coming soon...</p>
  </div>

  <script>
    let score = 0;
    const button = document.getElementById("addPoint");
    const shopMenu = document.getElementById("shopMenu");
    const openShopBtn = document.getElementById("openShop");
    const closeShopBtn = document.getElementById("closeShop");

    // Click Main Button
    button.addEventListener("mouseup", (e) => {
      score++;
      document.getElementById("score").textContent = score;

      const popup = document.createElement("div");
      popup.className = "plus-one";
      popup.innerHTML = `+1 <img src="button1.jpg">`;

      const randomX = Math.floor(Math.random() * 60 - 30) + "px";
      popup.style.setProperty("--x", randomX);
      popup.style.left = e.clientX + "px";
      popup.style.top = e.clientY + "px";

      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 1000);
    });

    // Open Shop
    openShopBtn.addEventListener("click", () => {
      shopMenu.style.display = "block";
    });

    // Close Shop
    closeShopBtn.addEventListener("click", () => {
      shopMenu.style.display = "none";
    });
  </script>
</body>
</html>
