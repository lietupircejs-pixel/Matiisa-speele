<!DOCTYPE html>
<html>
<head>
  <title>Matīt Clicker</title>
  <style> 
    /* --- BASE STYLES --- */
    body { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #b3abab; 
      user-select: none; 
      overflow: hidden; 
    } 

    /* --- MAIN BUTTON (THE MATĪT) --- */
    #addPoint { 
      cursor: pointer; 
      height: 40vh; 
      margin: 20px 0; 
      transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      -webkit-user-drag: none; 
      z-index: 5; 
    } 
    #addPoint:active { transform: scale(0.9); } 

    /* --- SHOP OPENER --- */
    .shop-btn { 
      background: none; 
      border: none; 
      cursor: pointer; 
      padding: 10px; 
      transition: transform 0.2s; 
      z-index: 10; 
    } 
    .shop-btn:hover { transform: scale(1.1); } 
    .shop-icon { height: 60px; width: auto; } 

    /* --- THE SHOP MENU --- */
    #shopMenu { 
      display: none; 
      position: fixed; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      width: 70vh;  
      max-width: 90vw; 
      height: 70vh; 
      background-color: #d1cbcb; 
      border: 5px solid #444; 
      border-radius: 20px; 
      z-index: 100; 
      padding: 25px; 
      box-shadow: 0 0 60px rgba(0,0,0,0.6); 
      box-sizing: border-box; 
      overflow-y: auto; 
    } 

    #closeShop { 
      position: absolute; 
      top: 15px; 
      right: 25px; 
      font-size: 35px; 
      font-weight: bold; 
      cursor: pointer; 
      color: #444; 
      z-index: 101;
    } 

    .shop-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #999;
      padding-bottom: 15px;
    }

    .nav-btn {
      background-color: #7a7a7a; 
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 #444;
    }
    .nav-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #444; }

    .tab-content { display: none; }
    .active-tab { display: block; }

    .upgrade-item { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      background: rgba(255, 255, 255, 0.3); 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 15px; 
      border: 2px solid #999; 
    } 
    .upgrade-info b { font-size: 1.3rem; display: block; } 
    .upgrade-info span { font-size: 1rem; color: #222; } 

    .upgrade-right { display: flex; align-items: center; gap: 15px; } 
    .upgrade-img { height: 50px; width: 50px; border-radius: 8px; background: #888; object-fit: cover; } 

    .buy-btn { 
      background-color: #4CAF50; 
      color: white; 
      border: none; 
      padding: 12px 18px; 
      border-radius: 10px; 
      font-weight: bold; 
      cursor: pointer; 
      position: relative; 
      box-shadow: 0 5px 0 #2e6631; 
    } 
    .buy-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 0 #2e6631; } 
    .buy-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 1px 0 #2e6631; } 
    .buy-btn:disabled { background-color: #888; box-shadow: none; cursor: not-allowed; transform: none; } 

    .running-matit-video { position: fixed; width: 120px; pointer-events: none; z-index: 1; } 
    .plus-one img { height: 30px; width: auto; vertical-align: middle; margin-left: 5px; } 
    .plus-one { position: absolute; font-size: 26px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 20; } 
    @keyframes floatUp { 
      from { opacity: 1; transform: translate(-50%, -50%); } 
      to { transform: translate(calc(-50% + var(--x)), -150px); opacity: 0; } 
    } 
  </style> 
</head> 

<body> 
  <h1>Matīt clicker</h1> 
  <p>Click the Matīt</p> 

  <img id="addPoint" src="button1.jpg" alt="Add point" draggable="false"> 

  <audio id="casinoSound" src="casino.mp3" loop></audio>
<video id="jackpotVideo" src="jackpot.mp4" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; object-fit: cover; display: none; z-index: 9999; pointer-events: none;"></video>

  <p style="font-size: 1.8rem; margin-bottom: 5px; font-weight: bold;">€: <span id="score">0.0</span></p> 
  <p style="font-size: 1.1rem; color: #222; margin-top: 0;">Income: €/s <span id="income">0.0</span></p> 

  <button id="openShop" class="shop-btn"> 
    <img src="shop.png" class="shop-icon" draggable="false"> 
  </button> 

  <div id="shopMenu"> 
    <span id="closeShop">&times;</span> 

    <div class="shop-nav">
      <button class="nav-btn" onclick="showTab('shopTab')">Shop</button>
      <button id="musicNavBtn" class="nav-btn" style="display: none;" onclick="showTab('musicTab')">Music</button>
      <button id="casinoNavBtn" class="nav-btn" style="display: none;" onclick="showTab('casinoTab')">Casino</button>
    </div>

    <div id="shopTab" class="tab-content active-tab">
      <h2 style="text-align: center; margin-top: 0;">Upgrades</h2> 
      <hr> 
      
      <div class="upgrade-item"> 
        <div class="upgrade-info"><b>Autoclicker</b><span>+0.1€ per sec</span></div> 
        <div class="upgrade-right">
          <img src="autoclicker.png" class="upgrade-img">
          <button id="buyAutoclicker" class="buy-btn">30€</button>
        </div> 
      </div>

      <div class="upgrade-item"> 
        <div class="upgrade-info"><b>Running Matīt</b><span>2X Multiplier (Max 6)</span></div> 
        <div class="upgrade-right">
          <video src="run.mp4" class="upgrade-img" muted loop autoplay></video> 
          <button id="buyRunning" class="buy-btn">300€</button>
        </div> 
      </div>

      <div class="upgrade-item" id="musicUpgradeRow">
        <div class="upgrade-info"><b>Unlock Music</b><span>Gain access to Music Tab</span></div>
        <div class="upgrade-right">
          <div class="upgrade-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🎵</div>
          <button id="buyMusic" class="buy-btn">1000€</button>
        </div>
      </div>

      <div class="upgrade-item" id="casinoUpgradeRow">
        <div class="upgrade-info"><b>Unlock Casino</b><span>Gain access to Casino + 1.5X Mult</span></div>
        <div class="upgrade-right">
          <div class="upgrade-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🎲</div>
          <button id="buyCasino" class="buy-btn">5000€</button>
        </div>
      </div>
    </div>

    <div id="musicTab" class="tab-content">
      <h2 style="text-align: center;">Music Player</h2>
      <p style="text-align: center; color: #555;">Music tracks will appear here soon...</p>
    </div>

    <div id="casinoTab" class="tab-content">
  <h2 style="text-align: center;">Book of Matīt</h2>
  <p style="text-align: center; color: #444;">Cost: <b>250€</b></p>
  
  <div style="display: flex; justify-content: center; gap: 15px; margin: 20px 0;">
    <img id="reel1" src="image1.jpg" style="width: 80px; height: 80px; border: 3px solid #444; border-radius: 10px;">
    <img id="reel2" src="image2.jpg" style="width: 80px; height: 80px; border: 3px solid #444; border-radius: 10px;">
    <img id="reel3" src="image3.jpg" style="width: 80px; height: 80px; border: 3px solid #444; border-radius: 10px;">
  </div>

  <div style="text-align: center;">
    <button id="spinBtn" class="buy-btn" style="background-color: #e67e22; box-shadow: 0 5px 0 #a05817;">SPIN</button>
    <p id="slotMessage" style="font-weight: bold; margin-top: 15px; min-height: 1.2em;"></p>
  </div>
</div> 

  <script> 
    /* --- GAME STORAGE --- */
    let score = 0; 
    let autoClickers = 0; 
    let multiplier = 1; 
    let runningMatitsOwned = 0; 
    let musicUnlocked = false;
    let casinoUnlocked = false;
    const cheatCode = "ztmy"; 
    let userInput = ""; 

    /* --- ELEMENT LINKS --- */
    const scoreDisplay = document.getElementById("score"); 
    const incomeDisplay = document.getElementById("income"); 
    const buyAutoclickerBtn = document.getElementById("buyAutoclicker");
    const buyRunningBtn = document.getElementById("buyRunning"); 
    const buyMusicBtn = document.getElementById("buyMusic");
    const buyCasinoBtn = document.getElementById("buyCasino");
    const shopMenu = document.getElementById("shopMenu"); 

    /* --- TAB SWITCHING LOGIC --- */
    function showTab(tabId) {
      const contents = document.getElementsByClassName('tab-content');
      for (let content of contents) { 
        content.classList.remove('active-tab'); 
      }
      document.getElementById(tabId).classList.add('active-tab');
    }

    /* --- DISPLAY REFRESH (Handles Nav visibility) --- */
    function updateDisplay() {
      scoreDisplay.textContent = score.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}); 
      
      let currentIncome = ((autoClickers * 0.1) + (runningMatitsOwned * 1)) * multiplier; 
      incomeDisplay.textContent = currentIncome.toFixed(1); 
      
      // Basic Upgrade Buttons
      buyAutoclickerBtn.disabled = score < 30;
      if (runningMatitsOwned >= 6) { 
        buyRunningBtn.textContent = "SOLD OUT"; 
        buyRunningBtn.disabled = true; 
      } else { 
        buyRunningBtn.disabled = score < 300; 
      }

      // Music Nav & Button Visibility
      const musicNav = document.getElementById("musicNavBtn");
      if (musicUnlocked) {
        musicNav.style.display = "inline-block"; 
        buyMusicBtn.textContent = "UNLOCKED";
        buyMusicBtn.disabled = true;
      } else {
        musicNav.style.display = "none";
        buyMusicBtn.disabled = score < 1000;
      }

      // Casino Nav & Button Visibility
      const casinoNav = document.getElementById("casinoNavBtn");
      if (casinoUnlocked) {
        casinoNav.style.display = "inline-block";
        buyCasinoBtn.textContent = "UNLOCKED";
        buyCasinoBtn.disabled = true;
      } else {
        casinoNav.style.display = "none";
        buyCasinoBtn.disabled = score < 5000;
      }
    }

    /* --- CLICKING LOGIC --- */
    document.getElementById("addPoint").addEventListener("mousedown", (e) => { 
      score += (1 * multiplier); 
      updateDisplay(); 
      const popup = document.createElement("div"); 
      popup.className = "plus-one"; 
      popup.innerHTML = `+${(1 * multiplier).toFixed(0)} <img src="button1.jpg">`; 
      popup.style.setProperty("--x", (Math.random() * 80 - 40) + "px"); 
      popup.style.left = e.clientX + "px"; 
      popup.style.top = e.clientY + "px"; 
      document.body.appendChild(popup); 
      setTimeout(() => popup.remove(), 800); 
    }); 

    /* --- SHOP PURCHASES --- */
    buyAutoclickerBtn.addEventListener("click", () => { 
      if (score >= 30) { 
        score -= 30; 
        autoClickers++; 
        updateDisplay(); 
      } 
    });

    buyRunningBtn.addEventListener("click", () => { 
      if (score >= 300 && runningMatitsOwned < 6) { 
        score -= 300; 
        if (runningMatitsOwned === 0) multiplier = 2; 
        runningMatitsOwned++; 
        spawnRunningVideo(); 
        updateDisplay(); 
      } 
    });

    buyMusicBtn.addEventListener("click", () => {
      if (score >= 1000 && !musicUnlocked) {
        score -= 1000;
        musicUnlocked = true;
        updateDisplay();
      }
    });

    buyCasinoBtn.addEventListener("click", () => {
      if (score >= 5000 && !casinoUnlocked) {
        score -= 5000;
        casinoUnlocked = true;
        multiplier *= 1.5; 
        updateDisplay();
      }
    });

    /* --- PASSIVE INCOME LOOP --- */
    setInterval(() => { 
      let totalBaseIncome = (autoClickers * 0.1) + (runningMatitsOwned * 1.0);
      if (totalBaseIncome > 0) { 
        score += totalBaseIncome * multiplier; 
        updateDisplay(); 
      } 
    }, 1000);

    /* --- VIDEO SYSTEM --- */
    function spawnRunningVideo() { 
      const vid = document.createElement("video"); 
      vid.src = "run.mp4"; 
      vid.className = "running-matit-video"; 
      vid.loop = true; vid.muted = true; vid.autoplay = true; 
      document.body.appendChild(vid); 

      let speed = Math.random() * 8 + 2; 
      let travel = Math.random() * 2000; 

      function animate() { 
        const w = window.innerWidth; 
        const h = window.innerHeight; 
        const total = (w + h) * 2; 
        travel = (travel + speed) % total; 
        let x, y, rot; 
        if (travel < w) { x = travel; y = 0; rot = 180; } 
        else if (travel < w + h) { x = w - 100; y = travel - w; rot = 270; } 
        else if (travel < w * 2 + h) { x = w - (travel - (w + h)) - 100; y = h - 100; rot = 0; } 
        else { x = 0; y = h - (travel - (w * 2 + h)) - 100; rot = 90; } 
        vid.style.left = x + "px"; 
        vid.style.top = y + "px"; 
        vid.style.transform = `rotate(${rot}deg)`; 
        requestAnimationFrame(animate); 
      } 
      animate(); 
    } 

    /* --- UI TOGGLES --- */
    document.getElementById("openShop").addEventListener("click", () => { shopMenu.style.display = "block"; }); 
    document.getElementById("closeShop").addEventListener("click", () => { shopMenu.style.display = "none"; }); 

    /* --- CHEAT CODE --- */
    window.addEventListener("keydown", (e) => { 
      userInput += e.key.toLowerCase(); 
      if (userInput.length > 4) userInput = userInput.substring(userInput.length - 4); 
      if (userInput === cheatCode) { score += 10000000; updateDisplay(); userInput = ""; } 
    }); 

  /* --- FIXED SLOT MACHINE LOGIC (Merged Audio, Video, and Cinematic Timing) --- */
const spinBtn = document.getElementById("spinBtn");
const slotMessage = document.getElementById("slotMessage");
const reels = [document.getElementById("reel1"), document.getElementById("reel2"), document.getElementById("reel3")];
const symbols = ["image1.jpg", "image2.jpg", "image3.jpg", "button1.jpg"];
const casinoSound = document.getElementById("casinoSound");
const jackpotVideo = document.getElementById("jackpotVideo");

spinBtn.addEventListener("click", () => {
  if (score < 250) {
    alert("You need 250€ to spin!");
    return;
  }

  // 1. Start State & Audio
  score -= 250;
  updateDisplay(); 
  slotMessage.textContent = "Good luck...";
  slotMessage.style.color = "#444";
  spinBtn.disabled = true;
  
  casinoSound.currentTime = 0;
  casinoSound.play();

  // 2. Logic: E.V. 0 (5% Jackpot, 40% Win, 55% Lose)
  let rng = Math.random();
  let winAmount = 0;
  let finalSymbols = [];

  if (rng < 0.05) {
    winAmount = 1000;
    finalSymbols = ["button1.jpg", "button1.jpg", "button1.jpg"];
  } else if (rng < 0.45) {
    winAmount = 500;
    let picked = symbols[Math.floor(Math.random() * 3)];
    finalSymbols = [picked, picked, picked];
  } else {
    winAmount = 0;
    finalSymbols = ["image1.jpg", "image2.jpg", "image3.jpg"].sort(() => Math.random() - 0.5);
  }

  // 3. Cinematic Animation Loop
  let ticks = 0;
  const maxTicks = 40; 
  
  let interval = setInterval(() => {
    ticks++;

    // Randomize reels that haven't locked yet
    if (ticks <= 20) reels[0].src = symbols[Math.floor(Math.random() * 4)];
    if (ticks <= 30) reels[1].src = symbols[Math.floor(Math.random() * 4)];
    if (ticks <= 40) reels[2].src = symbols[Math.floor(Math.random() * 4)];

    // Staggered Lock-in
    if (ticks === 20) reels[0].src = finalSymbols[0];
    if (ticks === 30) reels[1].src = finalSymbols[1];
    
    if (ticks >= maxTicks) {
      clearInterval(interval);
      reels[2].src = finalSymbols[2]; 
      
      casinoSound.pause(); // Stop spinning sound

      // 4. Reveal Results & Video
      if (winAmount > 0) {
        score += winAmount;
        slotMessage.style.color = winAmount === 1000 ? "gold" : "green";
        slotMessage.textContent = `WINNER! +${winAmount}€`;

        if (winAmount === 1000) {
          jackpotVideo.style.display = "block";
          jackpotVideo.currentTime = 0;
          jackpotVideo.play();
          jackpotVideo.onended = () => { jackpotVideo.style.display = "none"; };
        }
      } else {
        slotMessage.style.color = "red";
        slotMessage.textContent = "Better luck next time!";
      }

      updateDisplay();
      spinBtn.disabled = false;
    }
  }, 75);
});
  </script> 
</body> 
</html>
